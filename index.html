<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VA Command | Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --bg2: #111118; --bg3: #18181f; --bg4: #1e1e28;
  --border: rgba(255,255,255,0.07); --text: #f0f0f5; --muted: #6b6b80; 
  --accent: #7c6af7; --accent2: #a78bfa; --accent3: #38d9a9; --red: #f87171;
  --r: 14px; --r2: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

/* LOGIN OVERLAY */
#login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { width: 100%; max-width: 320px; text-align: center; }
.login-card h1 { font-family: 'Syne'; margin-bottom: 8px; font-size: 24px; }
.login-card p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

/* APP LAYOUT */
.app { display: none; flex-direction: column; height: 100vh; }
.topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
.content { flex: 1; overflow-y: auto; padding: 16px 16px 100px; }
.page { display: none; }
.page.active { display: block; }

/* UI COMPONENTS */
.card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r2); padding: 16px; margin-bottom: 12px; }
.inp { width: 100%; background: var(--bg4); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; color: #fff; outline: none; margin-bottom: 10px; font-size: 16px; }
.btn { width: 100%; background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: var(--r); font-weight: 600; cursor: pointer; }
.task-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.task-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; }
.task-check.done { background: var(--accent3); border-color: var(--accent3); }
.task-text.done { text-decoration: line-through; color: var(--muted); }

.bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--bg2); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 env(safe-area-inset-bottom); }
.nav-btn { background: none; border: none; color: var(--muted); font-size: 10px; display: flex; flex-direction: column; align-items: center; }
.nav-btn.active { color: var(--accent2); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>VA Command</h1>
    <p>Enter your Client Access Key</p>
    <input type="text" id="client-key" class="inp" placeholder="Client Name or ID...">
    <button class="btn" onclick="login()">Access Portal</button>
  </div>
</div>

<div class="app" id="main-app">
  <div class="topbar">
    <div style="font-family:'Syne'">VA <span id="display-client" style="color:var(--accent2)"></span></div>
    <button onclick="logout()" style="background:none; border:none; color:var(--red); font-size:11px;">Logout</button>
  </div>

  <div class="content">
    <div class="page active" id="page-tasks">
      <div class="card">
        <input type="text" id="task-inp" class="inp" placeholder="New task...">
        <button class="btn" onclick="addTask()">Add Task</button>
      </div>
      <div id="task-list"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="goTo('tasks')">Tasks</button>
    <button class="nav-btn" onclick="alert('Client settings coming soon!')">Settings</button>
  </nav>
</div>

<script>
let currentClient = "";
let tasks = [];

// 1. LOGIN LOGIC: Separates data by Client Key
function login() {
    const key = document.getElementById('client-key').value.trim().toLowerCase();
    if (!key) return alert("Please enter a key");
    
    currentClient = key;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    document.getElementById('display-client').innerText = key.toUpperCase();
    
    loadTasks();
}

function loadTasks() {
    // Use the client key as the storage name so they don't see other clients' data
    const saved = localStorage.getItem('tasks_' + currentClient);
    tasks = saved ? JSON.parse(saved) : [];
    render();
}

function saveTasks() {
    localStorage.setItem('tasks_' + currentClient, JSON.stringify(tasks));
    render();
}

function addTask() {
    const inp = document.getElementById('task-inp');
    if (!inp.value) return;
    tasks.push({ id: Date.now(), text: inp.value, done: false });
    inp.value = '';
    saveTasks();
}

function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
    saveTasks();
}

function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
}

function render() {
    const list = document.getElementById('task-list');
    list.innerHTML = tasks.map(t => `
        <div class="task-item">
            <div class="task-check ${t.done ? 'done' : ''}" onclick="toggleTask(${t.id})"></div>
            <div class="task-text ${t.done ? 'done' : ''}" style="flex:1">${t.text}</div>
            <div onclick="deleteTask(${t.id})" style="color:var(--red); font-size:18px">×</div>
        </div>
    `).join('');
}

function logout() {
    location.reload(); // Returns to login screen
}
</script>
</body>
</html>
