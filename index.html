<html lang="en">
<head>

<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-title" content="Client Portal">
<link rel="apple-touch-icon" sizes="192x192" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgdmlld0JveD0iMCAwIDE5MiAxOTIiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIxOTIiIGhlaWdodD0iMTkyIiByeD0iMjQiIGZpbGw9IiMyRDUwMTYiLz4KPHRleHQgeD0iOTYiIHk9IjExMiIgZm9udC1mYW1pbHk9IkZyaHVtY2VzLCBzZXJpZiIgZm9udC1zaXplPSI2NCIgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5QQVJUT0w8L3RleHQ+Cjwvc3ZnPg==">
<link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIkNsaWVudCBQb3J0YWwiLAogICJzaG9ydF9uYW1lIjogIlBvcnRhbCIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmFmYWY4IiwKICAidGhlbWVfY29sb3IiOiAiIzJkNTAxNiIKfQ==">
<title>Client Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #fafaf8; --bg2: #ffffff; --bg3: #f4f3ef; --bg4: #eeede8;
  --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.12);
  --text: #1a1a18; --muted: #7a7a72; --muted2: #aeada6;
  --accent: #2d5016; --accent-light: #eaf2e3; --accent2: #4a7c2f;
  --gold: #8b6914; --gold-light: #fdf4dc; --red: #c0392b; --red-light: #fdf0ee;
  --blue: #1a4a7a; --blue-light: #eaf0f8;
  --font-head: 'Fraunces', serif; --font-body: 'Plus Jakarta Sans', sans-serif;
  --r: 12px; --r2: 18px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); overflow-x: hidden; }

.login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.login-mark { width: 56px; height: 56px; border-radius: 16px; background: var(--accent); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
.login-mark svg { width: 28px; height: 28px; color: white; }
.login-title { font-family: var(--font-head); font-size: 28px; font-weight: 500; text-align: center; margin-bottom: 6px; }
.login-sub { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 36px; }
.login-box { width: 100%; max-width: 380px; }
.inp { width: 100%; padding: 13px 16px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--r); font-family: var(--font-body); font-size: 15px; outline: none; margin-bottom: 10px; }
.login-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: var(--r); font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.login-btn:active { opacity: 0.8; }

.app { display: none; flex-direction: column; height: 100vh; height: 100dvh; }
.app.visible { display: flex; }
.portal-header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
.header-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; background: var(--accent-light); color: var(--accent); }
.portal-content { flex: 1; overflow-y: auto; padding-bottom: 100px; }
.page { display: none; padding: 18px 16px; }
.page.active { display: block; animation: fadeUp 0.3s ease; }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px; border: none; background: transparent; color: var(--muted); font-size: 11px; font-weight: 600; }
.nav-btn.active { color: var(--accent2); }

.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 16px; margin-bottom: 12px; }
.card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 12px; }
.welcome-banner { background: var(--accent); border-radius: var(--r2); padding: 20px; color: white; margin-bottom: 14px; }
.status-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.status-box { background: var(--bg3); border-radius: var(--r); padding: 12px; text-align: center; }
.status-num { font-family: var(--font-head); font-size: 22px; font-weight: 500; }

.task-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.task-status { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2); margin-top: 2px; }
.ts-done { background: var(--accent2); border-color: var(--accent2); position: relative; }
.ts-done::after { content: '✓'; color: white; font-size: 10px; position: absolute; left: 3px; top: 0px; }
.task-name { font-size: 14px; font-weight: 500; }
.task-name.done { text-decoration: line-through; color: var(--muted); }

.textarea { width: 100%; padding: 12px; border: 1px solid var(--border2); border-radius: var(--r); min-height: 100px; font-family: inherit; resize: none; margin-bottom: 12px; }
.success-msg { display: none; background: var(--accent-light); color: var(--accent2); padding: 10px; border-radius: var(--r); text-align: center; font-size: 13px; margin-top: 10px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-mark">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
  </div>
  <div class="login-title">Client Portal</div>
  <div class="login-sub">Enter your access code</div>
  <div class="login-box">
    <input class="inp" type="password" id="access-code" placeholder="Access Code">
    <button class="login-btn" onclick="handleLogin()">Sign in</button>
    <div id="login-error" style="color:var(--red); font-size:12px; margin-top:10px; display:none; text-align:center;">Invalid access code.</div>
  </div>
</div>

<div id="portal-app" class="app">
  <div class="portal-header">
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="header-avatar" id="hdr-avatar">?</div>
      <div>
        <div class="header-name" id="hdr-name" style="font-size:14px; font-weight:600;">Client</div>
        <div style="font-size:10px; color:var(--muted)">Active Session</div>
      </div>
    </div>
    <button onclick="logout()" style="background:none; border:none; color:var(--red); font-size:12px; font-weight:600;">Logout</button>
  </div>

  <div class="portal-content">
    <div class="page active" id="pp-home">
      <div class="welcome-banner">
        <div style="font-size:12px; opacity:0.8;">Welcome back,</div>
        <h2 id="wb-name" style="font-family:var(--font-head); font-weight:500;">User</h2>
      </div>
      <div class="status-row">
        <div class="status-box"><div class="status-num" id="st-pending" style="color:var(--gold)">0</div><div style="font-size:10px;">Pending</div></div>
        <div class="status-box"><div class="status-num" id="st-done" style="color:var(--accent2)">0</div><div style="font-size:10px;">Done</div></div>
        <div class="status-box"><div class="status-num" id="st-total" style="color:var(--blue)">0</div><div style="font-size:10px;">Total</div></div>
      </div>
      <div class="card">
        <div class="card-label">Priority Tasks</div>
        <div id="home-tasks"></div>
      </div>
    </div>

    <div class="page" id="pp-tasks">
      <h3 style="font-family:var(--font-head); margin-bottom:15px;">Your Tasks</h3>
      <div id="full-task-list"></div>
    </div>

    <div class="page" id="pp-requests">
      <h3 style="font-family:var(--font-head); margin-bottom:15px;">New Request</h3>
      <div class="card">
        <div class="card-label">What do you need help with?</div>
        <input class="inp" id="req-type-inp" placeholder="e.g. Email Draft, Research">
        <textarea class="textarea" id="req-desc" placeholder="Provide details for your VA..."></textarea>
        <button class="login-btn" onclick="submitRequest()">Send Request</button>
        <div class="success-msg" id="req-success">✓ Request sent to your VA!</div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="btn-home" onclick="goPortalPage('home')">HOME</button>
    <button class="nav-btn" id="btn-tasks" onclick="goPortalPage('tasks')">TASKS</button>
    <button class="nav-btn" id="btn-requests" onclick="goPortalPage('requests')">REQUEST</button>
  </nav>
</div>

<script>
// --- CONFIGURATION ---
// I updated this to use your real project URL and Anon Key correctly
const SUPABASE_URL = 'https://vpflotnvkwwpvqspbksu.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwZmxvdG52a3d3cHZxc3Bia3N1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjExNzEsImV4cCI6MjA5MzIzNzE3MX0.XFH6QY3SFnrFWp3WVGYy7LTWRUtAhL64KxCr8DjLvHk';

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

// --- AUTH LOGIC ---
async function handleLogin() {
  const code = document.getElementById('access-code').value.trim().toLowerCase();
  
  // Replace the ID below with a real User UID from your Supabase Auth tab
  if(code === 'client1') {
    currentUser = { 
      id: 'PASTE_REAL_USER_UID_HERE', 
      name: 'Natalie' 
    };
    initPortal();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  location.reload();
}

async function initPortal() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('portal-app').classList.add('visible');
  document.getElementById('wb-name').textContent = currentUser.name;
  document.getElementById('hdr-name').textContent = currentUser.name;
  document.getElementById('hdr-avatar').textContent = currentUser.name.charAt(0);
  
  fetchTasks();
}

// --- DATA FETCHING ---
async function fetchTasks() {
  const { data: tasks, error } = await _supabase
    .from('tasks')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error('Error:', error);
  } else {
    renderTasksUI(tasks);
  }
}

async function submitRequest() {
  const type = document.getElementById('req-type-inp').value;
  const desc = document.getElementById('req-desc').value;

  if(!type || !desc) return alert("Please fill in all fields.");

  const { error } = await _supabase
    .from('requests')
    .insert([{ type, description: desc, user_id: currentUser.id }]);

  if (!error) {
    const msg = document.getElementById('req-success');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
    document.getElementById('req-type-inp').value = '';
    document.getElementById('req-desc').value = '';
  } else {
    alert("Error: " + error.message);
  }
}

// --- UI RENDERING ---
function renderTasksUI(tasks) {
  const container = document.getElementById('full-task-list');
  const homeContainer = document.getElementById('home-tasks');
  
  if (!tasks || tasks.length === 0) {
    const empty = '<div style="font-size:12px; color:var(--muted); padding:10px;">No tasks assigned.</div>';
    container.innerHTML = empty;
    homeContainer.innerHTML = empty;
    return;
  }

  const html = tasks.map(t => `
    <div class="task-item">
      <div class="task-status ${t.status === 'done' ? 'ts-done' : ''}"></div>
      <div class="task-body">
        <div class="task-name ${t.status === 'done' ? 'done' : ''}">${t.name}</div>
        <div style="font-size:10px; color:var(--muted); margin-top:2px;">Due: ${t.due_date || 'N/A'}</div>
      </div>
    </div>
  `).join('');

  container.innerHTML = `<div class="card">${html}</div>`;
  homeContainer.innerHTML = html.slice(0, 3); 

  document.getElementById('st-total').textContent = tasks.length;
  document.getElementById('st-done').textContent = tasks.filter(t => t.status === 'done').length;
  document.getElementById('st-pending').textContent = tasks.filter(t => t.status !== 'done').length;
}

function goPortalPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pp-' + page).classList.add('active');
  document.getElementById('btn-' + page).classList.add('active');
}
</script>
</body>
</html>
