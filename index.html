<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA Command</title>

<style>
body { margin:0; font-family:Arial; background:#0a0a0f; color:#fff; }
.app { padding:20px; }
button { padding:10px 15px; margin:5px; cursor:pointer; }
.card { background:#18181f; padding:15px; margin-bottom:10px; border-radius:10px; }
</style>
</head>

<body>
<div class="app">

<h2 id="role">VA Dashboard</h2>

<div id="dashboard"></div>

<div id="clients"></div>

</div>

<script>
// ================= DATA =================
const CLIENT_DATA = {
  maria: { name: 'Natalie', avatar: 'N', tasks: [] },
  jennifer: { name: 'Tabskie', avatar: 'T', tasks: [] },
  david: { name: 'Tenacity', avatar: 'TN', tasks: [] }
};

let currentUser = 'va';
let idCounter = 1;

// ================= INIT =================
renderDashboard();

// ================= DASHBOARD =================
function renderDashboard() {
  currentUser = 'va';
  document.getElementById('role').innerText = "VA Dashboard";

  let html = '';

  // stats
  const allTasks = Object.values(CLIENT_DATA).flatMap(c => c.tasks);
  const done = allTasks.filter(t => t.done).length;

  html += `<div class="card">
    Total Tasks: ${allTasks.length}<br>
    Completed: ${done}<br>
    Natalie: ${CLIENT_DATA.maria.tasks.length}<br>
    Others: ${CLIENT_DATA.jennifer.tasks.length + CLIENT_DATA.david.tasks.length}
  </div>`;

  // requests
  html += `<div class="card"><b>Natalie's Requests</b><br>`;
  CLIENT_DATA.maria.tasks.forEach(t=>{
    if(!t.done) html += `${t.text}<br>`;
  });
  html += `</div>`;

  html += `<div class="card"><b>Other Requests</b><br>`;
  [...CLIENT_DATA.jennifer.tasks, ...CLIENT_DATA.david.tasks].forEach(t=>{
    if(!t.done) html += `${t.text} (${t.client})<br>`;
  });
  html += `</div>`;

  // buttons
  html += `<div class="card">
    <button onclick="openClient('maria')">Natalie Portal</button>
    <button onclick="openClient('jennifer')">Tabskie Portal</button>
    <button onclick="openClient('david')">Tenacity Portal</button>
  </div>`;

  document.getElementById('dashboard').innerHTML = html;
  document.getElementById('clients').innerHTML = '';
}

// ================= CLIENT =================
function openClient(client) {
  currentUser = client;
  const data = CLIENT_DATA[client];

  document.getElementById('role').innerText = data.name + " Portal";

  let html = `
    <div class="card">
      <input id="taskInput" placeholder="New task">
      <button onclick="addTask('${client}')">Add</button>
      <button onclick="renderDashboard()">Back</button>
    </div>
  `;

  data.tasks.forEach(t=>{
    html += `
      <div class="card">
        ${t.text} <br>
        Status: ${t.done ? 'Done' : 'Pending'} <br>
        <button onclick="toggleTask('${client}', ${t.id})">Toggle</button>
        <button onclick="deleteTask('${client}', ${t.id})">Delete</button>
      </div>
    `;
  });

  document.getElementById('clients').innerHTML = html;
  document.getElementById('dashboard').innerHTML = '';
}

// ================= TASK FUNCTIONS =================
function addTask(client) {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if(!text) return;

  CLIENT_DATA[client].tasks.push({
    id: idCounter++,
    text,
    done:false,
    client: CLIENT_DATA[client].name
  });

  input.value='';
  openClient(client);
}

function toggleTask(client, id) {
  const task = CLIENT_DATA[client].tasks.find(t=>t.id===id);
  task.done = !task.done;
  openClient(client);
}

function deleteTask(client, id) {
  CLIENT_DATA[client].tasks =
    CLIENT_DATA[client].tasks.filter(t=>t.id!==id);
  openClient(client);
}
</script>

</body>
</html>
