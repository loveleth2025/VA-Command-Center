<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>VA Command</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --bg2: #111118; --bg3: #18181f; --bg4: #1e1e28;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5; --muted: #6b6b80; --accent: #7c6af7; --accent2: #a78bfa;
  --accent3: #38d9a9; --amber: #fbbf24; --red: #f87171; --blue: #60a5fa;
  --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
  --r: 14px; --r2: 20px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-body); }
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 18px 12px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.app-logo { font-family: var(--font-head); font-size: 17px; font-weight: 700; }
.app-logo span { color: var(--accent2); }
.content { flex: 1; overflow-y: auto; padding: 16px 16px 100px; }
.page { display: none; }
.page.active { display: block; }
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); z-index: 100; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; cursor: pointer; border: none; background: transparent; color: var(--muted); }
.nav-btn.active { color: var(--accent2); }
.nav-btn svg { width: 22px; height: 22px; margin-bottom: 4px; }
.nav-label { font-size: 10px; font-weight: 500; }
.card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r2); padding: 16px; margin-bottom: 12px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-box { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; }
.stat-num { font-family: var(--font-head); font-size: 26px; font-weight: 700; color: var(--accent2); }
.stat-lbl { font-size: 11px; color: var(--muted); }
.task-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.task-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border2); cursor: pointer; flex-shrink: 0; }
.task-check.done { background: var(--accent3); border-color: var(--accent3); }
.task-text { flex: 1; font-size: 14px; }
.task-text.done { text-decoration: line-through; color: var(--muted); }
.del-btn { color: var(--red); font-size: 18px; padding: 0 5px; cursor: pointer; opacity: 0.5; }
.input-row { display: flex; gap: 8px; margin-bottom: 15px; }
.inp { flex: 1; background: var(--bg4); border: 1px solid var(--border2); border-radius: var(--r); padding: 12px; color: #fff; outline: none; }
.btn { background: var(--accent); color: #fff; border: none; padding: 12px 20px; border-radius: var(--r); font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="app-logo">VA <span>Command</span></div>
    <div id="topbar-date" style="font-size: 11px; color: var(--muted);"></div>
  </div>

  <div class="content">
    <!-- DASHBOARD -->
    <div class="page active" id="page-dash">
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num" id="sd-tasks">0</div><div class="stat-lbl">Tasks Active</div></div>
        <div class="stat-box"><div class="stat-num" id="sd-done">0</div><div class="stat-lbl">Completed</div></div>
      </div>
      <div class="card">
        <h4 style="margin-bottom:10px; font-size:13px; color:var(--muted)">QUICK PREVIEW</h4>
        <div id="dash-tasks-preview"></div>
      </div>
    </div>

    <!-- TASKS PAGE -->
    <div class="page" id="page-tasks">
      <div class="input-row">
        <input type="text" class="inp" id="task-inp" placeholder="New task...">
        <button class="btn" onclick="addTask()">Add</button>
      </div>
      <div id="task-list-full"></div>
    </div>

    <div class="page" id="page-clients"><div class="card">Client management coming soon...</div></div>
    <div class="page" id="page-content"><div class="card">Content tools coming soon...</div></div>
    <div class="page" id="page-tracker"><div class="card">Habit tracker coming soon...</div></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nb-dash" onclick="goTo('dash')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" id="nb-tasks" onclick="goTo('tasks')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="nav-label">Tasks</span>
    </button>
    <button class="nav-btn" id="nb-clients" onclick="goTo('clients')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span class="nav-label">Clients</span>
    </button>
  </nav>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('va_tasks')) || [];

function goTo(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    document.getElementById('nb-' + pageId).classList.add('active');
}

function save() {
    localStorage.setItem('va_tasks', JSON.stringify(tasks));
    render();
}

function addTask() {
    const inp = document.getElementById('task-inp');
    if (!inp.value.trim()) return;
    tasks.push({ id: Date.now(), text: inp.value, done: false });
    inp.value = '';
    save();
}

function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
    save();
}

function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
}

function render() {
    const list = document.getElementById('task-list-full');
    const dash = document.getElementById('dash-tasks-preview');
    
    const html = tasks.map(t => `
        <div class="task-item">
            <div class="task-check ${t.done ? 'done' : ''}" onclick="toggleTask(${t.id})"></div>
            <div class="task-text ${t.done ? 'done' : ''}">${t.text}</div>
            <div class="del-btn" onclick="deleteTask(${t.id})">×</div>
        </div>
    `).join('');

    list.innerHTML = html || '<p style="color:var(--muted); font-size:13px">No tasks yet.</p>';
    dash.innerHTML = html || '<p style="color:var(--muted); font-size:13px">All clear!</p>';
    
    document.getElementById('sd-tasks').innerText = tasks.filter(t => !t.done).length;
    document.getElementById('sd-done').innerText = tasks.filter(t => t.done).length;
}

document.getElementById('topbar-date').innerText = new Date().toDateString();
render();
</script>
</body>
</html>
